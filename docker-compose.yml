services:
  yapper:
    container_name: yapper-bot
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TZ: ${TZ:-Asia/Taipei}
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 100
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
